services:
  postgres:
    image: postgres:16
    container_name: locacao-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    mem_limit: 1536m
    networks:
      - locacao-net

  backend:
    build: ./backend
    container_name: locacao-backend
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      MS_CONTROLE_ACESSO_URL: ${MS_CONTROLE_ACESSO_URL}
      APP_URL: ${APP_URL}
      SISTEMA_CODIGO: ${SISTEMA_CODIGO}
    ports:
      - "8080:8080"
    mem_limit: 1536m
    depends_on:
      - postgres
    networks:
      - locacao-net

  frontend:
    build: ./frontend
    container_name: locacao-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - locacao-net

  nginx:
    image: nginx:1.25-alpine
    container_name: locacao-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-certs:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    networks:
      - locacao-net

volumes:
  pgdata:
  certbot-certs:
  certbot-www:

networks:
  locacao-net:
    driver: bridge
